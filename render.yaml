services:
  - type: web
    name: doc-analyzer
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr libreoffice
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: API_KEY
        sync: false

      - key: GOOGLE_CREDENTIALS_JSON   # ✅ IMPORTANT
        sync: false

      - key: MC_RUNS
        value: "3"

      - key: MAX_TEXT_CHARS
        value: "6000"